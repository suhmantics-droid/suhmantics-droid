<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Sagar Subhash, GTM Engineer. Rebuilt a 26 million token enrichment pipeline to run at zero token cost.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3E0C5E"/>
      <stop offset="100%" stop-color="#160522"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B1A8A"/>
      <stop offset="100%" stop-color="#48146F"/>
    </linearGradient>
  </defs>

  <!-- frame -->
  <rect x="0" y="0" width="900" height="420" rx="8" fill="#FF1F8F"/>
  <rect x="10" y="10" width="880" height="400" rx="5" fill="url(#bg)" stroke="#6B2199"/>

  <!-- window chrome -->
  <rect x="10" y="10" width="880" height="30" rx="5" fill="url(#chrome)"/>
  <rect x="10" y="32" width="880" height="8" fill="#48146F"/>
  <circle cx="30" cy="25" r="5" fill="#FF5F57"/>
  <circle cx="48" cy="25" r="5" fill="#FEBC2E"/>
  <circle cx="66" cy="25" r="5" fill="#28C840"/>
  <text x="450" y="29" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#C79BE8" text-anchor="middle">~/gtm-stack — signal → enrich → score → act → measure</text>

  <!-- avatar -->
  <rect x="34" y="64" width="118" height="118" rx="3" fill="#4A1173" stroke="#FF4FA3"/>
  <text x="93" y="142" font-family="ui-monospace,Consolas,monospace" font-size="52" font-weight="bold" fill="#4BFFA5" text-anchor="middle">SS</text>

  <!-- identity -->
  <text x="174" y="94" font-family="ui-monospace,Consolas,monospace" font-size="27" font-weight="bold" fill="#FFFFFF">Sagar Subhash</text>
  <text x="174" y="118" font-family="ui-monospace,Consolas,monospace" font-size="14" fill="#FFC53D">GTM Engineer · Revenue Systems</text>
  <text x="174" y="146" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4BFFA5">// I replace "hire more SDRs" with pipelines.</text>
  <text x="174" y="164" font-family="ui-monospace,Consolas,monospace" font-size="12" fill="#4BFFA5">// Detect the signal, enrich it, score it, act, measure.</text>
  <text x="174" y="182" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#B489D6">UK · Sales Executive at Litecard · builds the system, then sells with it</text>

  <!-- headline metric -->
  <rect x="34" y="202" width="404" height="86" rx="3" fill="#38115A" stroke="#FF4FA3"/>
  <text x="52" y="238" font-family="ui-monospace,Consolas,monospace" font-size="30" font-weight="bold" fill="#4BFFA5">532k <tspan font-size="16" fill="#B489D6">tokens → ~0</tspan></text>
  <text x="52" y="260" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#F3D9FF">Same enrichment result, rebuilt on DNS + regex.</text>
  <text x="52" y="277" font-family="ui-monospace,Consolas,monospace" font-size="11" fill="#B489D6">~26M tokens avoided across the full 490-brand list.</text>

  <!-- stat tiles -->
  <rect x="452" y="202" width="126" height="86" rx="3" fill="#2E0B47" stroke="#6B2199"/>
  <text x="515" y="234" font-family="ui-monospace,Consolas,monospace" font-size="22" font-weight="bold" fill="#5BE9FF" text-anchor="middle">195</text>
  <text x="515" y="254" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#F3D9FF" text-anchor="middle">stacks confirmed</text>
  <text x="515" y="270" font-family="ui-monospace,Consolas,monospace" font-size="9" fill="#B489D6" text-anchor="middle">of 490, in ~20 min</text>

  <rect x="590" y="202" width="126" height="86" rx="3" fill="#2E0B47" stroke="#6B2199"/>
  <text x="653" y="234" font-family="ui-monospace,Consolas,monospace" font-size="22" font-weight="bold" fill="#5BE9FF" text-anchor="middle">3,840</text>
  <text x="653" y="254" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#F3D9FF" text-anchor="middle">domains classified</text>
  <text x="653" y="270" font-family="ui-monospace,Consolas,monospace" font-size="9" fill="#B489D6" text-anchor="middle">where MX alone failed</text>

  <rect x="728" y="202" width="138" height="86" rx="3" fill="#2E0B47" stroke="#6B2199"/>
  <text x="797" y="234" font-family="ui-monospace,Consolas,monospace" font-size="22" font-weight="bold" fill="#5BE9FF" text-anchor="middle">21</text>
  <text x="797" y="254" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#F3D9FF" text-anchor="middle">portable blueprints</text>
  <text x="797" y="270" font-family="ui-monospace,Consolas,monospace" font-size="9" fill="#B489D6" text-anchor="middle">lived vs recommended</text>

  <!-- terminal -->
  <rect x="34" y="302" width="832" height="92" rx="3" fill="#0E2145" stroke="#2E6BC4"/>
  <text x="52" y="326" font-family="ui-monospace,Consolas,monospace" font-size="11.5"><tspan fill="#5BE9FF">~/gtm-stack</tspan><tspan fill="#8FB4E8"> (main) &gt; </tspan><tspan fill="#F3D9FF">./crm-scan.ps1 -InputCsv retail-uk.csv</tspan></text>
  <text x="52" y="347" font-family="ui-monospace,Consolas,monospace" font-size="11.5"><tspan fill="#4BFFA5">✓</tspan><tspan fill="#8FB4E8"> 490 brands · 195 stacks confirmed · 0 tokens · 19m 42s</tspan></text>
  <text x="52" y="368" font-family="ui-monospace,Consolas,monospace" font-size="11.5"><tspan fill="#FFC53D">!</tspan><tspan fill="#8FB4E8"> 58 blocked-empty held for review — cost quoted, awaiting OK</tspan></text>
  <text x="52" y="386" font-family="ui-monospace,Consolas,monospace" font-size="11.5"><tspan fill="#4BFFA5">✓</tspan><tspan fill="#8FB4E8"> written to new tab, source untouched</tspan></text>
</svg>
